# Chart:      bitnami/postgresql  (repo: https://charts.bitnami.com/bitnami)
# Values ref: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
# Docs:       https://artifacthub.io/packages/helm/bitnami/postgresql

auth:
  database: sonar
  username: sonar
  # Local dev only — in production use jdbcSecretName + jdbcSecretPasswordKey instead
  password: "sonarpass"

primary:
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
